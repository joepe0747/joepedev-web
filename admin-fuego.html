<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Fuego | Login Seguro 🔥</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; text-align: center; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; }
        h1 { font-family: 'Bebas Neue', sans-serif; color: #ff2d00; font-size: 40px; }
        .btn { background: #fff; color: #000; border: none; padding: 15px 30px; border-radius: 100px; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .confesion-card { background: #1a1a1a; text-align: left; padding: 20px; border-radius: 12px; margin-top: 20px; border-left: 4px solid #ff2d00; }
        #admin-panel { display: none; }
        .user-info { font-size: 12px; color: #666; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container" id="login-section">
        <h1>BÚNKER JOEDEV 🔥</h1>
        <p>Acceso restringido a administradores.</p>
        <button class="btn" onclick="login()">ENTRAR CON GOOGLE</button>
    </div>

    <div class="container" id="admin-panel">
        <div class="user-info" id="user-display"></div>
        <h1>Confesiones Pendientes</h1>
        <div id="lista"></div>
        <button class="btn" style="background:#222; color:#fff; font-size:10px;" onclick="logout()">CERRAR SESIÓN</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, getDocs, updateDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW1Uw51T3hOJMRO43k6HQimg7eQ4kE29o",
            authDomain: "chatcalienteapp2.firebaseapp.com",
            projectId: "chatcalienteapp2",
            storageBucket: "chatcalienteapp2.firebasestorage.app",
            appId: "1:798220681076:web:44847b5dca7673dd4af621"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // Manejo de Sesión
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('user-display').innerText = `Admin: ${user.email} (UID: ${user.uid})`;
                cargarDatos();
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('admin-panel').style.display = 'none';
            }
        });

        window.login = () => signInWithPopup(auth, provider).catch(err => alert("Error: " + err.message));
        window.logout = () => signOut(auth);

        async function cargarDatos() {
            const lista = document.getElementById('lista');
            lista.innerHTML = "Buscando relatos...";
            try {
                const q = query(collection(db, "confesiones"), orderBy("fecha", "desc"));
                const querySnapshot = await getDocs(q);
                lista.innerHTML = "";
                querySnapshot.forEach((documento) => {
                    const data = documento.data();
                    const id = documento.id;
                    const card = document.createElement('div');
                    card.className = "confesion-card";
                    card.innerHTML = `
                        <p><strong>${data.autor}</strong> - ${data.fecha?.toDate().toLocaleString() || 'Sin fecha'}</p>
                        <p>${data.texto}</p>
                        <button class="btn" style="background:#00ff64; padding:8px 15px;" onclick="aprobar('${id}')">APROBAR</button>
                    `;
                    lista.appendChild(card);
                });
            } catch (err) {
                lista.innerHTML = `<p style="color:red">ERROR: No tenés permiso para estar acá. Tu UID debe estar en las Reglas de Firebase.</p>`;
                console.error(err);
            }
        }

        window.aprobar = async (id) => {
            try {
                await updateDoc(doc(db, "confesiones", id), { verificado: true });
                alert("¡Publicada!");
                cargarDatos();
            } catch (err) { alert("Error al aprobar: " + err.message); }
        }
    </script>
</body>
</html>
