<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://apis.google.com https://challenges.cloudflare.com https://static.cloudflareinsights.com https://www.googletagmanager.com; script-src-elem 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com https://challenges.cloudflare.com https://static.cloudflareinsights.com https://www.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; frame-src 'self' https://chatcalienteapp2.firebaseapp.com https://challenges.cloudflare.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://*.cloudflareinsights.com;">    
    <title>Bunker joeDEV | Admin Fuego 🔥</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; text-align: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; background: #111; padding: 30px; border-radius: 20px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Bebas Neue', sans-serif; color: #ff2d00; font-size: 40px; margin-bottom: 10px; }
        .btn { background: #fff; color: #000; border: none; padding: 15px 30px; border-radius: 100px; font-weight: 700; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn:hover { background: #ff2d00; color: #fff; }
        .confesion-card { background: #1a1a1a; text-align: left; padding: 20px; border-radius: 12px; margin-top: 20px; border-left: 4px solid #ff2d00; }
        #admin-panel { display: none; }
        .user-info { font-size: 11px; color: #444; margin-bottom: 20px; word-break: break-all; }
    </style>
</head>
<body>

    <div class="container" id="login-section">
        <h1>BÚNKER JOEDEV 🔥</h1>
        <p>Solo personal autorizado.</p>
        <button class="btn" onclick="login()">ENTRAR CON GOOGLE</button>
    </div>

    <div class="container" id="admin-panel">
        <div class="user-info" id="user-display"></div>
        <h1>Relatos por Aprobar</h1>
        <div id="lista"></div>
        <br>
        <button onclick="logout()" style="background:none; border:1px solid #333; color:#555; padding:8px 15px; border-radius:50px; cursor:pointer; font-size:11px;">Cerrar Sesión</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, getDocs, updateDoc, doc, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW1Uw51T3hOJMRO43k6HQimg7eQ4kE29o",
            authDomain: "chatcalienteapp2.firebaseapp.com",
            projectId: "chatcalienteapp2",
            storageBucket: "chatcalienteapp2.firebasestorage.app",
            appId: "1:798220681076:web:44847b5dca7673dd4af621"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'block';
                document.getElementById('user-display').innerText = `Admin: ${user.email} | UID: ${user.uid}`;
                cargarDatos();
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('admin-panel').style.display = 'none';
            }
        });

        window.login = () => signInWithPopup(auth, provider).catch(err => alert("Error: " + err.message));
        window.logout = () => signOut(auth);

        async function cargarDatos() {
            const lista = document.getElementById('lista');
            lista.innerHTML = "Leyendo Firestore...";
            try {
                const q = query(collection(db, "confesiones"), where("verificado", "==", false), orderBy("fecha", "desc"));
                const querySnapshot = await getDocs(q);
                lista.innerHTML = "";
                if (querySnapshot.empty) { lista.innerHTML = "<p>Todo al día. No hay nada nuevo.</p>"; return; }

                querySnapshot.forEach((documento) => {
                    const data = documento.data();
                    const id = documento.id;
                    const card = document.createElement('div');
                    card.className = "confesion-card";
                    card.innerHTML = `
                        <p style="font-size:12px; color:#666;">${data.fecha?.toDate().toLocaleString()}</p>
                        <p><strong>${data.autor}</strong></p>
                        <p>${data.texto}</p>
                        <button class="btn" style="background:#00ff64; padding:8px 15px;" onclick="aprobar('${id}')">APROBAR</button>
                    `;
                    lista.appendChild(card);
                });
            } catch (err) {
                lista.innerHTML = `<p style="color:red">ERROR DE PERMISOS. Revisá tu UID en Firebase.</p>`;
                console.error(err);
            }
        }

        window.aprobar = async (id) => {
            try {
                await updateDoc(doc(db, "confesiones", id), { verificado: true });
                alert("¡Relato publicado!");
                cargarDatos();
            } catch (err) { alert("Error: " + err.message); }
        }
    </script>
</body>
</html>
