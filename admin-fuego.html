<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control 🔥 | Moderación Chat Caliente</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; padding: 20px; }
        h1 { font-family: 'Bebas Neue', sans-serif; color: #ff2d00; letter-spacing: 2px; }
        .confesion-card { 
            background: #141414; border: 1px solid #333; padding: 20px; 
            border-radius: 15px; margin-bottom: 20px; transition: 0.3s;
        }
        .confesion-card.aprobada { border-left: 5px solid #00ff64; }
        .meta { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
        .texto { font-size: 14px; line-height: 1.6; margin-bottom: 15px; }
        .btn-aprobar { 
            background: #ff2d00; color: #fff; border: none; padding: 10px 20px; 
            border-radius: 100px; font-weight: 900; cursor: pointer;
        }
        .btn-aprobar:disabled { background: #330000; color: #666; }
        .adjunto { display: block; margin-top: 10px; color: #ffff00; text-decoration: none; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Moderación de Confesiones 🔥</h1>
    <div id="lista-pendientes">Cargando el fuego...</div>

    <script type="module">
        const PROJECT_ID = "chatcalienteapp2";
        const API_BASE = `https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/confesiones?orderBy=fecha%20desc`;

        async function cargarConfesiones() {
            const container = document.getElementById('lista-pendientes');
            try {
                const res = await fetch(`${API_BASE}?pageSize=50`);
                const data = await res.json();

                if (!data.documents) {
                    container.innerHTML = "<p>No hay confesiones aún.</p>";
                    return;
                }

                container.innerHTML = "";
                data.documents.forEach(doc => {
                    const id = doc.name.split('/').pop();
                    const fields = doc.fields;
                    const aprobada = fields.verificado?.booleanValue || false;

                    const card = document.createElement('div');
                    card.className = `confesion-card ${aprobada ? 'aprobada' : ''}`;
                    card.innerHTML = `
                        <div class="meta">${fields.fecha.timestampValue} | Por: ${fields.autor.stringValue}</div>
                        <div class="texto">${fields.texto.stringValue}</div>
                        ${fields.adjuntoUrl?.stringValue ? `<a href="${fields.adjuntoUrl.stringValue}" target="_blank" class="adjunto">📎 Ver Adjunto</a>` : ''}
                        <button class="btn-aprobar" ${aprobada ? 'disabled' : ''} onclick="aprobar('${id}')">
                            ${aprobada ? 'PUBLICADA' : 'APROBAR Y PUBLICAR'}
                        </button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = "Error al cargar."; }
        }

        window.aprobar = async (id) => {
            const res = await fetch(`https://firestore.googleapis.com/v1/projects/${PROJECT_ID}/databases/(default)/documents/confesiones/${id}?updateMask.fieldPaths=verificado`, {
                method: 'PATCH',
                body: JSON.stringify({ fields: { verificado: { booleanValue: true } } })
            });
            if (res.ok) cargarConfesiones();
        };

        cargarConfesiones();
    </script>
</body>
</html>
