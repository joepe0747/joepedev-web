<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Aprobar Confesión 🔥</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% -10%, #2b0000 0%, #000 75%);
        }
        .card {
            background: rgba(15,15,15,0.92);
            border: 1px solid rgba(255,0,0,0.28);
            border-radius: 28px;
            padding: 52px 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 0 60px rgba(255,0,0,0.15);
        }
        .icon { font-size: 56px; display: block; margin-bottom: 20px; }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            letter-spacing: 3px;
            margin-bottom: 12px;
        }
        h1.success { color: #ff6a00; }
        h1.error   { color: #ff4444; }
        p { font-size: 13px; color: #666; letter-spacing: 1px; line-height: 1.6; }
        .id-label {
            margin-top: 20px;
            font-size: 10px;
            color: #333;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        #doc-id {
            font-size: 11px;
            color: #444;
            word-break: break-all;
            margin-top: 4px;
        }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW1Uw51T3hOJMRO43k6HQimg7eQ4kE29o",
            authDomain: "chatcalienteapp2.firebaseapp.com",
            projectId: "chatcalienteapp2",
            storageBucket: "chatcalienteapp2.firebasestorage.app",
            messagingSenderId: "798220681076",
            appId: "1:798220681076:web:44847b5dca7673dd4af621"
        };

        const app = initializeApp(firebaseConfig);
        const db  = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        const iconEl  = document.getElementById('result-icon');
        const titleEl = document.getElementById('result-title');
        const msgEl   = document.getElementById('result-msg');
        const idEl    = document.getElementById('doc-id');

        if (!id) {
            iconEl.textContent  = '⚠️';
            titleEl.textContent = 'ID NO ESPECIFICADO';
            titleEl.className   = 'error';
            msgEl.textContent   = 'Falta el parámetro ?id= en la URL.';
        } else {
            idEl.textContent = id;

            // Verificamos que el doc exista antes de intentar actualizar
            getDoc(doc(db, "confesiones", id))
                .then((snap) => {
                    if (!snap.exists()) {
                        throw new Error("El documento no existe en Firestore.");
                    }
                    if (snap.data().verificado === true) {
                        iconEl.textContent  = '✅';
                        titleEl.textContent = 'YA ESTABA PUBLICADO';
                        titleEl.className   = 'success';
                        msgEl.textContent   = 'Este relato ya fue aprobado anteriormente.';
                        return;
                    }
                    return updateDoc(doc(db, "confesiones", id), {
                        verificado: true,
                        fechaAprobacion: new Date()
                    });
                })
                .then((result) => {
                    // Si result es undefined, ya manejamos el caso "ya publicado"
                    if (result !== undefined) {
                        iconEl.textContent  = '🔥';
                        titleEl.textContent = '¡RELATO PUBLICADO!';
                        titleEl.className   = 'success';
                        msgEl.textContent   = 'El relato ya es visible en la página de confesiones.';
                    }
                })
                .catch((err) => {
                    iconEl.textContent  = '❌';
                    titleEl.textContent = 'ERROR';
                    titleEl.className   = 'error';
                    msgEl.textContent   = err.message;
                });
        }
    </script>
</head>
<body>
    <div class="card">
        <span class="icon" id="result-icon">⏳</span>
        <h1 id="result-title" class="success">COCINANDO...</h1>
        <p id="result-msg">Procesando la aprobación del relato.</p>
        <div class="id-label">ID del documento</div>
        <div id="doc-id">—</div>
    </div>
</body>
</html>
