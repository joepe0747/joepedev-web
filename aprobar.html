<!DOCTYPE html>
<html>
<head>
    <title>Aprobando...</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAW1Uw51T3hOJMRO43k6HQimg7eQ4kE29o",
            authDomain: "chatcalienteapp2.firebaseapp.com",
            projectId: "chatcalienteapp2",
            storageBucket: "chatcalienteapp2.firebasestorage.app",
            messagingSenderId: "798220681076",
            appId: "1:798220681076:web:44847b5dca7673dd4af621" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Sacamos el ID de la URL
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if(id) {
            updateDoc(doc(db, "confesiones", id), { verificado: true })
                .then(() => document.body.innerHTML = "<h1>🔥 ¡RELATO PUBLICADO!</h1>")
                .catch(err => document.body.innerHTML = "<h1>❌ ERROR: " + err.message + "</h1>");
        }
    </script>
</head>
<body style="background:#000; color:#fff; text-align:center; padding-top:50px; font-family:sans-serif;">
    Cocinando el fuego...
</body>
</html>
