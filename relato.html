<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' https: data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.gstatic.com https://*.firebaseio.com https://static.cloudflareinsights.com;
        connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firebasestorage.googleapis.com https://www.google-analytics.com https://static.cloudflareinsights.com;
        img-src 'self' data: https:;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
    ">
    <title>Relato Completo 🔥 | Chat Caliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #000;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% -10%, #2b0000 0%, #000 75%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(15,15,15,0.95);
            border: 1px solid rgba(255,0,0,0.2);
            border-radius: 32px;
            padding: 40px;
            box-shadow: 0 0 50px rgba(255,0,0,0.1);
        }
        .meta {
            font-size: 10px;
            letter-spacing: 3px;
            color: #ff2d00;
            text-transform: uppercase;
            margin-bottom: 10px;
            font-weight: 900;
        }
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 42px;
            letter-spacing: 2px;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #fff, #ffcc00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .texto {
            font-size: 16px;
            line-height: 1.8;
            color: #ccc;
            white-space: pre-wrap; /* Mantiene los saltos de línea del usuario */
            margin-bottom: 30px;
        }
        .img-container {
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }
        img { width: 100%; display: block; }
        .btn-volver {
            margin-top: 40px;
            display: inline-block;
            color: #666;
            text-decoration: none;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
        }
        .btn-volver:hover { color: #ff2d00; }
        #loader { font-size: 20px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="container" id="content">
        <div id="loader">🔥 Cargando relato...</div>
    </div>

    <a href="javascript:history.back()" class="btn-volver">← Volver al Blog</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAW1Uw51T3hOJMRO43k6HQimg7eQ4kE29o",
            authDomain: "chatcalienteapp2.firebaseapp.com",
            projectId: "chatcalienteapp2",
            appId: "1:798220681076:web:44847b5dca7673dd4af621"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        const container = document.getElementById('content');

        if (!id) {
            container.innerHTML = "<h1>Error: Relato no encontrado</h1>";
        } else {
            const docRef = doc(db, "confesiones", id);
            getDoc(docRef).then(snap => {
                if (snap.exists()) {
                    const data = snap.data();
                    const fecha = data.fecha?.toDate() ? data.fecha.toDate().toLocaleDateString('es-AR') : 'RECIENTE';
                    
                    container.innerHTML = `
                        <div class="meta">${fecha} · RELATO VERIFICADO</div>
                        <h1>${data.autor || 'Anónimo'}</h1>
                        <div class="texto">${data.historia || ''}</div>
                        ${data.archivoUrl ? `
                            <div class="img-container">
                                <img src="${data.archivoUrl}" alt="Adjunto">
                            </div>
                        ` : ''}
                    `;
                } else {
                    container.innerHTML = "<h1>El relato no existe</h1>";
                }
            }).catch(err => {
                container.innerHTML = "<h1>Error al conectar con el búnker</h1>";
            });
        }
    </script>
</body>
</html>
