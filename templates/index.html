<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>joeDEV · Template Studio — Sitios Web para tu Negocio</title>
<meta name="description" content="10 plantillas de sitios web profesionales. Personalizá con los datos de tu cliente y descargá el HTML listo.">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070710;
  --bg2:#0d0d1a;
  --accent:#6c63ff;
  --teal:#00d4aa;
  --text:#f0eeff;
  --muted:#6b6880;
  --glass:rgba(108,99,255,0.07);
  --glass-b:rgba(108,99,255,0.18);
  --border:#1e1e30;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;min-height:100vh}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:rgba(7,7,16,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.nav-brand{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;text-decoration:none;background:linear-gradient(90deg,var(--accent),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px}
.nav-back{font-size:13px;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:6px;transition:color .2s}
.nav-back:hover{color:var(--text)}

/* LAYOUT */
.app{display:grid;grid-template-columns:320px 1fr;height:100vh;padding-top:60px}

/* PANEL */
.panel{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;position:relative}
.panel-header{padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02);flex-shrink:0}
.panel-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px;color:var(--text)}
.panel-sub{font-size:12px;color:var(--muted)}

/* TEMPLATE TABS */
.template-tabs{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.tpl-btn{padding:8px 10px;border:1px solid var(--border);border-radius:10px;font-size:11px;cursor:pointer;background:transparent;color:var(--muted);text-align:left;transition:all .15s;line-height:1.3;font-family:'DM Sans',sans-serif}
.tpl-btn:hover{background:var(--glass);color:var(--text);border-color:var(--glass-b)}
.tpl-btn.active{background:rgba(108,99,255,.2);border-color:rgba(108,99,255,.5);color:var(--text)}
.tpl-name{font-weight:600;font-size:11px;display:block}
.tpl-cat{font-size:10px;opacity:.6;margin-top:1px;display:block}

/* FORM */
.form-section{padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.form-section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:12px;font-weight:500}
.form-row{margin-bottom:10px}
.form-label{font-size:11px;color:var(--muted);margin-bottom:4px;display:block;letter-spacing:.3px}
input[type=text],textarea,select{width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,.04);color:var(--text);outline:none;transition:border-color .2s}
input[type=text]:focus,textarea:focus{border-color:var(--accent);background:rgba(108,99,255,.07)}
textarea{resize:vertical;min-height:64px;line-height:1.5}
input[type=text]::placeholder,textarea::placeholder{color:var(--muted)}
.color-row{display:flex;gap:8px;align-items:center}
input[type=color]{width:38px;height:34px;border:1px solid var(--border);border-radius:8px;padding:3px;cursor:pointer;background:transparent;flex-shrink:0}
.color-hint{font-size:11px;color:var(--muted)}

/* ACTIONS */
.actions{padding:14px 16px;display:flex;flex-direction:column;gap:8px;flex-shrink:0}
.btn-primary{width:100%;padding:11px;background:linear-gradient(135deg,var(--accent),var(--teal));color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.3px;transition:opacity .2s}
.btn-primary:hover{opacity:.88}
.btn-secondary{width:100%;padding:10px;background:var(--glass);color:var(--text);border:1px solid var(--glass-b);border-radius:10px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s}
.btn-secondary:hover{background:rgba(108,99,255,.15)}
.copy-success{color:var(--teal)!important;border-color:rgba(0,212,170,.3)!important}

/* PREVIEW */
.preview{background:#0a0a0f;overflow:hidden;display:flex;flex-direction:column}
.preview-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#060609;border-bottom:1px solid var(--border);flex-shrink:0}
.browser-dots{display:flex;gap:5px;flex-shrink:0}
.dot{width:10px;height:10px;border-radius:50%}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
.url-bar{flex:1;background:rgba(255,255,255,.05);border-radius:6px;padding:5px 12px;font-size:11px;color:var(--muted);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scale-btns{display:flex;gap:4px;flex-shrink:0}
.scale-btn{padding:4px 10px;font-size:11px;border:1px solid var(--border);border-radius:6px;color:var(--muted);background:transparent;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif}
.scale-btn.active{background:rgba(108,99,255,.2);border-color:rgba(108,99,255,.5);color:var(--text)}
.preview-wrap{flex:1;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;padding:0;background:#0a0a0f}
iframe{border:none;transition:all .3s;display:block}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:#1a1a2e;border:1px solid rgba(0,212,170,.3);border-radius:10px;color:var(--teal);font-size:13px;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

/* MOBILE TOGGLE */
@media(max-width:900px){
  .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .panel{max-height:50vh;border-right:none;border-bottom:1px solid var(--border)}
}
@media(max-width:480px){
  nav{padding:0 16px}
  .template-tabs{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-brand">joeDEV</a>
  <a href="/" class="nav-back">← Volver al inicio</a>
</nav>

<div class="app">
  <!-- PANEL IZQUIERDO -->
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Template Studio</div>
      <div class="panel-sub">Elegí plantilla · Completá datos · Exportá</div>
    </div>

    <div class="template-tabs" id="tplTabs"></div>

    <div class="form-section">
      <div class="form-section-title">Datos del cliente</div>
      <div class="form-row">
        <label class="form-label">Empresa / Nombre</label>
        <input type="text" id="f_name" value="Tu Empresa" oninput="render()">
      </div>
      <div class="form-row">
        <label class="form-label">Tagline / Slogan</label>
        <input type="text" id="f_tagline" value="La mejor solución para tu negocio" oninput="render()">
      </div>
      <div class="form-row">
        <label class="form-label">Descripción breve</label>
        <textarea id="f_desc" oninput="render()">Somos un equipo apasionado que transforma ideas en productos digitales reales.</textarea>
      </div>
      <div class="form-row">
        <label class="form-label">Botón principal (CTA)</label>
        <input type="text" id="f_cta" value="Empezar ahora" oninput="render()">
      </div>
      <div class="form-row">
        <label class="form-label">Email de contacto</label>
        <input type="text" id="f_email" value="hola@tuempresa.com" oninput="render()">
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Colores</div>
      <div class="form-row">
        <div class="color-row">
          <input type="color" id="f_color1" value="#6c63ff" oninput="render()">
          <input type="color" id="f_color2" value="#00d4aa" oninput="render()">
          <span class="color-hint">Color primario · Color acento</span>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Servicios / Items</div>
      <div class="form-row">
        <label class="form-label">Ítem 1</label>
        <input type="text" id="f_s1" value="Diseño Web" oninput="render()">
      </div>
      <div class="form-row">
        <label class="form-label">Ítem 2</label>
        <input type="text" id="f_s2" value="Apps Móviles" oninput="render()">
      </div>
      <div class="form-row">
        <label class="form-label">Ítem 3</label>
        <input type="text" id="f_s3" value="Consultoría" oninput="render()">
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" onclick="exportHTML()">⬇ Descargar HTML listo</button>
      <button class="btn-secondary" id="copyBtn" onclick="copyHTML()">Copiar código fuente</button>
    </div>
  </div>

  <!-- PREVIEW DERECHA -->
  <div class="preview">
    <div class="preview-bar">
      <div class="browser-dots">
        <div class="dot dot-r"></div>
        <div class="dot dot-y"></div>
        <div class="dot dot-g"></div>
      </div>
      <div class="url-bar" id="urlBar">https://tuempresa.com</div>
      <div class="scale-btns">
        <button class="scale-btn active" id="sc-d" onclick="setScale('desktop')">Desktop</button>
        <button class="scale-btn" id="sc-m" onclick="setScale('mobile')">Mobile</button>
      </div>
    </div>
    <div class="preview-wrap" id="frameWrap">
      <iframe id="preview" scrolling="yes"></iframe>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TEMPLATES = [
  {id:'agency',   name:'Agencia Digital', cat:'Servicios',      icon:'◈'},
  {id:'restaurant',name:'Restaurante',    cat:'Food & Bebida',  icon:'◉'},
  {id:'startup',  name:'SaaS / Startup',  cat:'Tech',           icon:'◇'},
  {id:'portfolio',name:'Portafolio',      cat:'Freelancer',     icon:'◎'},
  {id:'store',    name:'Tienda Online',   cat:'E-commerce',     icon:'◌'},
  {id:'clinic',   name:'Clínica / Salud', cat:'Salud',          icon:'◈'},
  {id:'realestate',name:'Inmobiliaria',   cat:'Real Estate',    icon:'◆'},
  {id:'event',    name:'Evento',          cat:'Eventos',        icon:'◉'},
  {id:'gym',      name:'Gym / Fitness',   cat:'Deporte',        icon:'◇'},
  {id:'law',      name:'Estudio Legal',   cat:'Legal',          icon:'◎'}
];

let currentTpl = 'agency';
let currentScale = 'desktop';

function g(id){return document.getElementById(id).value}
function gc(id){return document.getElementById(id).value}

const tabsEl = document.getElementById('tplTabs');
TEMPLATES.forEach(t => {
  const b = document.createElement('button');
  b.className = 'tpl-btn' + (t.id===currentTpl?' active':'');
  b.id = 'tab-'+t.id;
  b.innerHTML = `<span class="tpl-name">${t.icon} ${t.name}</span><span class="tpl-cat">${t.cat}</span>`;
  b.onclick = () => {
    currentTpl = t.id;
    document.querySelectorAll('.tpl-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    render();
  };
  tabsEl.appendChild(b);
});

function getVars(){
  return {
    name:    g('f_name')    || 'Mi Empresa',
    tagline: g('f_tagline') || 'Slogan aquí',
    desc:    g('f_desc')    || 'Descripción aquí.',
    cta:     g('f_cta')     || 'Comenzar',
    email:   g('f_email')   || 'hola@empresa.com',
    c1:      gc('f_color1'),
    c2:      gc('f_color2'),
    s1:      g('f_s1')      || 'Servicio 1',
    s2:      g('f_s2')      || 'Servicio 2',
    s3:      g('f_s3')      || 'Servicio 3',
  };
}

/* ============================================================
   PLANTILLAS (10)
   ============================================================ */

function agencyTpl(v){return`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${v.name}</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#07070f;color:#f0eeff;font-family:'DM Sans',sans-serif}nav{position:fixed;top:0;left:0;right:0;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 40px;background:rgba(7,7,15,.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08);z-index:99}.logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;background:linear-gradient(90deg,${v.c1},${v.c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent}.nav-cta{padding:8px 20px;background:${v.c1};color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}.hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:100px 24px 60px;position:relative;overflow:hidden}.orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}.orb1{width:500px;height:500px;background:radial-gradient(circle,${v.c1}30,transparent 70%);top:-100px;left:-100px}.orb2{width:400px;height:400px;background:radial-gradient(circle,${v.c2}25,transparent 70%);bottom:-80px;right:-80px}h1{font-family:'Syne',sans-serif;font-size:clamp(52px,9vw,96px);font-weight:800;line-height:.95;letter-spacing:-2px;margin-bottom:20px;position:relative}h1 span{background:linear-gradient(135deg,${v.c1},${v.c2});-webkit-background-clip:text;-webkit-text-fill-color:transparent}.sub{font-size:18px;color:#888;max-width:520px;margin:0 auto 40px;line-height:1.7;position:relative}.cta-btn{padding:16px 36px;background:linear-gradient(135deg,${v.c1},${v.c2});color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:500;cursor:pointer;position:relative}.services{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;max-width:900px;margin:80px auto;padding:0 24px}.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:36px 28px;text-align:center}.card-icon{font-size:36px;margin-bottom:16px}.card-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:10px;color:${v.c2}}.card-text{font-size:14px;color:#888;line-height:1.6}footer{text-align:center;padding:40px;border-top:1px solid rgba(255,255,255,.06);color:#555;font-size:13px}@media(max-width:700px){.services{grid-template-columns:1fr}nav{padding:0 20px}}</style></head><body><nav><div class="logo">${v.name}</div><button class="nav-cta">${v.cta}</button></nav><section class="hero"><div class="orb orb1"></div><div class="orb orb2"></div><h1>Creamos<br><span>lo que importa</span></h1><p class="sub">${v.tagline}</p><button class="cta-btn">${v.cta}</button></section><section class="services"><div class="card"><div class="card-icon">◈</div><div class="card-title">${v.s1}</div><div class="card-text">${v.desc}</div></div><div class="card"><div class="card-icon">◉</div><div class="card-title">${v.s2}</div><div class="card-text">Soluciones que escalan con tu negocio.</div></div><div class="card"><div class="card-icon">◇</div><div class="card-title">${v.s3}</div><div class="card-text">Estrategia y ejecución en un solo lugar.</div></div></section><footer>Contacto: ${v.email} · © 2026 ${v.name}</footer></body></html>`}

function restaurantTpl(v){return`<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>${v.name}</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0805;color:#f5f0e8;font-family:'DM Sans',sans-serif}nav{position:fixed;top:0;left:0;right:0;height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;background:rgba(10,8,5,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,200,100,.1);z-index:99}.logo{font-family:'Playfair Display',serif;font-size:22px;color:${v.c1}}.nav-cta{padding:9px 22px;border:1px solid ${v.c1};color:${v.c1};background:transparent;border-radius:6px;font-size:13px;cursor:pointer}.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:80px 24px;background:radial-gradient(ellipse at center,rgba(180,100,30,.15) 0%,transparent 70%)}.hero-inner{max-width:700px}.eyebrow{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:${v.c1};margin-bottom:20px}h1{font-family:'Playfair Display',serif;font-size:clamp(56px,9vw,100px);font-weight:900;line-height:.9;margin-bottom:28px;color:#f5f0e8}h1 em{color:${v.c1};font-style:italic}.sub{font-size:17px;color:#9a8f7a;line-height:1.7;margin-bottom:40px}.cta-wrap{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}.btn-gold{padding:14px 32px;background:${v.c1};color:#0a0805;font-weight:600;border:none;border-radius:8px;font-size:15px;cursor:pointer}.btn-ghost{padding:14px 32px;border:1px solid rgba(255,255,255,.2);color:#f5f0e8;background:transparent;border-radius:8px;font-size:15px;cursor:pointer}.menu{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;margin:80px auto;padding:0 24px}.item{background:rgba(255,255,255,.03);border:1px solid rgba(255 /* ============================================================
   RENDER + ESCALA
   ============================================================ */

function buildHTML(v){
  const map = {agency:agencyTpl,restaurant:restaurantTpl,startup:startupTpl,portfolio:portfolioTpl,store:storeTpl,clinic:clinicTpl,realestate:realestateTpl,event:eventTpl,gym:gymTpl,law:lawTpl};
  return map[currentTpl](v);
}

function render(){
  const v = getVars();
  document.getElementById('preview').srcdoc = buildHTML(v);
  const slug = v.name.toLowerCase().replace(/\s+/g,'') || 'tuempresa';
  document.getElementById('urlBar').textContent = 'https://' + slug + '.com';
}

function setScale(s){
  currentScale = s;
  const iframe = document.getElementById('preview');
  const wrap = document.getElementById('frameWrap');
  document.getElementById('sc-d').classList.toggle('active', s==='desktop');
  document.getElementById('sc-m').classList.toggle('active', s==='mobile');
  if(s==='mobile'){
    iframe.style.width = '390px';
    iframe.style.height = '844px';
    iframe.style.transform = 'none';
    iframe.style.marginLeft = '0';
    iframe.style.borderRadius = '24px';
  } else {
    const ww = wrap.clientWidth;
    const scale = Math.min(1, ww / 1200);
    iframe.style.width = '1200px';
    iframe.style.height = Math.floor(wrap.clientHeight) + 'px';
    iframe.style.transform = `scale(${scale})`;
    iframe.style.transformOrigin = 'top left';
    iframe.style.marginLeft = Math.floor((ww - 1200 * scale) / 2) + 'px';
    iframe.style.borderRadius = '0';
  }
}

/* EXPORT */
function getCurrentHTML(){return buildHTML(getVars())}

function exportHTML(){
  const v = getVars();
  const html = getCurrentHTML();
  const blob = new Blob([html],{type:'text/html;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (v.name.replace(/\s+/g,'-').toLowerCase()||'sitio') + '-' + currentTpl + '.html';
  a.click();
  showToast('Descargando ' + v.name + '...');
}

function copyHTML(){
  navigator.clipboard.writeText(getCurrentHTML()).then(()=>{
    showToast('Código copiado al portapapeles!');
  }).catch(()=>{
    showToast('Usá el botón Descargar en este browser');
  });
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

/* INIT */
window.addEventListener('load',()=>{
  render();
  setTimeout(()=>setScale('desktop'), 100);
});
window.addEventListener('resize',()=>{
  if(currentScale==='desktop') setScale('desktop');
});
</script>
